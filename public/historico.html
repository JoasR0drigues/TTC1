<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de movimentações</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="logo-texto">
      <span class="logo-destaque">Proteção</span> Patrimonial RFID
    </div>

    <nav class="menu">
    <a href="Patrimônios.html">Patrimônios</a>
    <a href="historico.html" class="ativo">Histórico</a>
    <a href="salas-vinculadas.html">Salas Vinculadas</a>
    <a href="monitoramento-ultrassonico.html">Monitoramento</a>
    </nav>
  </header>

  <main>
    <section class="card historico-card">
    <h2>Histórico e movimentações</h2>
    <p class="historico-subtitulo">
    Histórico consolidado de entradas, saídas, cadastros e movimentações de patrimônios.
    </p>

      <div class="historico-busca">
    <label for="busca-historico">Buscar no histórico</label>

       <div class="campo-busca">
    <span class="icone-busca">🔍</span>
    <input
    type="text"
    id="busca-historico"
    placeholder="Pesquisar por patrimônio">
    <button type="button" class="btn-limpar">×</button>
    </div>
    </div>

    <div class="tabela-wrapper">
    <table class="tabela-historico">
    <thead>
    <tr>
    <th>Data/Hora</th>
    <th>Tipo</th>
    <th>Patrimônio</th>
    <th>UID</th>
    <th>Confirmado por</th>
    <th>Localização</th>
    <th>Ações</th>
    </tr>
    </thead>
    <tbody id="historico-body">
    <tr>
    <td colspan="7" class="tabela-vazia">Nenhuma movimentação encontrada.</td>
    </tr>
    </tbody>
    </table>
    </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebaseconfig.js"></script>
  <script src="auth.js"></script>
  <script>
    const sessao = AuthApp.protegerPagina({ allowedRoles: ["admin", "comum"] });
    firebase.initializeApp(window.firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();
    const buscaHistorico = document.getElementById("busca-historico");
    const btnLimpar = document.querySelector(".btn-limpar");
    const historicoBody = document.getElementById("historico-body");
    let historicoCompleto = [];

    function formatarDataHora(valor) {
      const numero = Number(valor || 0);
      if (!numero) return "--";
      const ms = numero < 9999999999 ? numero * 1000 : numero;
      return new Date(ms).toLocaleString("pt-BR");
    }

    function classeTipo(tipo) {
      if (tipo === "entrada") return "tipo-badge tipo-entrada";
      if (tipo === "saida") return "tipo-badge tipo-saida";
      return "tipo-badge tipo-cadastro";
    }

    function textoParaFiltro(item) {
      return [
        item.tipo,
        item.patrimonio,
        item.uid,
        item.confirmadoPor,
        item.localizacao
      ].join(" ").toLowerCase();
    }

    function renderHistorico(lista) {
      if (!lista.length) {
        historicoBody.innerHTML = '<tr><td colspan="7" class="tabela-vazia">Nenhuma movimentação encontrada.</td></tr>';
        return;
      }

      historicoBody.innerHTML = lista.map((item) => `
        <tr>
          <td>${formatarDataHora(item.timestamp)}</td>
          <td><span class="${classeTipo(item.tipo)}">${item.tipo}</span></td>
          <td><strong>${item.patrimonio || "--"}</strong></td>
          <td>${item.uid || "--"}</td>
          <td>${item.confirmadoPor || "--"}</td>
          <td>${item.localizacao || "--"}</td>
          <td>${sessao?.role === "admin"
            ? `<button type="button" class="btn btn-excluir btn-excluir-historico" data-id="${item.id || ""}" data-origem="${item.origem || ""}">Excluir</button>`
            : "--"}</td>
        </tr>
      `).join("");
    }

    function aplicarFiltro() {
      const filtro = (buscaHistorico.value || "").trim().toLowerCase();
      if (!filtro) {
        renderHistorico(historicoCompleto);
        return;
      }
      const filtrada = historicoCompleto.filter((item) => textoParaFiltro(item).includes(filtro));
      renderHistorico(filtrada);
    }

    function carregarHistorico(snapshotAcessos, snapshotMov) {
      const acessos = snapshotAcessos.val() || {};
      const movimentacoes = snapshotMov.val() || {};
      const itens = [];

      Object.entries(acessos).forEach(([id, item]) => {
        if (!item?.uid) return;
        itens.push({
          id,
          origem: "acessos",
          tipo: item.tipo_tag === "usuario" ? "leitura-usuario" : "leitura-tag",
          patrimonio: item.patrimonio_nome || item.nome || "Tag lida",
          uid: item.uid || item.uid_key || "--",
          confirmadoPor: "ESP32",
          localizacao: item.objeto_detectado ? "Recinto monitorado" : "Sem confirmação",
          timestamp: item.timestamp || 0
        });
      });

      Object.entries(movimentacoes).forEach(([id, item]) => {
        if (!item) return;
        itens.push({
          id,
          origem: "movimentacoes",
          tipo: item.tipo || "movimentacao",
          patrimonio: item.patrimonio_nome || item.patrimonio_codigo || "--",
          uid: item.uid_tag || "--",
          confirmadoPor: item.confirmado_por || "--",
          localizacao: item.tipo === "entrada" ? "Dentro do recinto" : "Fora do recinto",
          timestamp: item.timestamp || 0
        });
      });

      historicoCompleto = itens.sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));
      aplicarFiltro();
    }

    async function excluirRegistroHistorico(id, origem) {
      if (!id || !origem || sessao?.role !== "admin") return;
      const caminho = origem === "movimentacoes" ? `movimentacoes/${id}` : `acessos/${id}`;
      await db.ref(caminho).remove();
    }

    async function iniciar() {
      try {
        await auth.signInAnonymously();
        db.ref("acessos").on("value", (snapshotAcessos) => {
          db.ref("movimentacoes").once("value").then((snapshotMov) => {
            carregarHistorico(snapshotAcessos, snapshotMov);
          });
        });
        db.ref("movimentacoes").on("value", (snapshotMov) => {
          db.ref("acessos").once("value").then((snapshotAcessos) => {
            carregarHistorico(snapshotAcessos, snapshotMov);
          });
        });
      } catch (erro) {
        historicoBody.innerHTML = '<tr><td colspan="7" class="tabela-vazia">Falha ao carregar histórico do Firebase.</td></tr>';
      }
    }

    buscaHistorico.addEventListener("input", aplicarFiltro);
    btnLimpar.addEventListener("click", () => {
      buscaHistorico.value = "";
      aplicarFiltro();
    });

    historicoBody.addEventListener("click", async (event) => {
      const alvo = event.target;
      if (!(alvo instanceof HTMLElement)) return;
      if (!alvo.classList.contains("btn-excluir-historico")) return;
      const id = alvo.getAttribute("data-id") || "";
      const origem = alvo.getAttribute("data-origem") || "";
      const confirmou = window.confirm("Deseja realmente excluir este registro do histórico?");
      if (!confirmou) return;
      await excluirRegistroHistorico(id, origem);
    });

    iniciar();
  </script>
</body>
</html>
