<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topo">
  <div class="logo-texto">
  <span class="logo-destaque">Proteção</span> Patrimonial RFID
  </div>
  <nav class="menu">
  <a href="Login.HTML" class="ativo">Início</a>
  <a href="sobre.html">Sobre</a>
  </nav>
  </header>

  <main class="conteudo-login">
  <section class="card">
  <h2>Cadastro de Usuário</h2>
  <form id="form-criar-conta">
  <div class="campo">
  <label for="email">Usuário</label>
  <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
  </div>

  <div class="campo">
  <label for="senha">Senha</label>
  <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
  </div>

  <div class="campo">
  <label for="confirmar">Confirmar senha</label>
  <input type="password" id="confirmar" name="confirmar" placeholder="Digite sua senha novamente" required>
  </div>

  <div class="campo">
  <label for="tipo-usuario">Tipo de usuário</label>
  <select id="tipo-usuario" name="tipo-usuario">
  <option value="comum">Usuário comum</option>
  <option value="admin">Administrador</option>
  </select>
  </div>

  <div class="campo" id="campo-tag-admin" style="display: none;">
  <label for="tag-admin">Tag UID do admin</label>
  <input type="text" id="tag-admin" name="tag-admin" placeholder="Ex: 4D 6F 8I F4">
  </div>

  <div class="botoes">
  <a href="Login.HTML" class="btn btn-secundario">Voltar</a>
  <button type="submit" class="btn btn-primario">Criar conta</button>
  </div>
  <p id="cadastro-msg"></p>
  </form>
  </section>

    <section class="card hero-imagem">
    <div class="card-logo">
    <img src="logo-rfid.png.png" alt="Logo do sistema">
    </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebaseconfig.js"></script>
  <script>
    AuthApp.protegerPagina({ allowAnonymous: true });

    const tipoUsuario = document.getElementById("tipo-usuario");
    const campoTagAdmin = document.getElementById("campo-tag-admin");
    const formConta = document.getElementById("form-criar-conta");
    const cadastroMsg = document.getElementById("cadastro-msg");
    const tagAdminInput = document.getElementById("tag-admin");

    const statusTag = document.createElement("p");
    statusTag.id = "tag-detectada-cadastro-msg";
    statusTag.textContent = "Aguardando leitura de tag RFID...";
    statusTag.style.marginTop = "6px";
    statusTag.style.fontSize = "0.9rem";
    statusTag.style.color = "#5b4c7d";
    campoTagAdmin.appendChild(statusTag);

    function normalizarTag(tag) {
      return String(tag || "").trim().replace(/\s+/g, "").toUpperCase();
    }

    function formatarTag(tag) {
      const limpa = normalizarTag(tag);
      return limpa ? limpa.replace(/(.{2})(?=.)/g, "$1 ").trim() : "";
    }

    function iniciarLeituraTagRfid() {
      if (!window.firebaseConfig || typeof firebase === "undefined") {
        statusTag.textContent = "Configuração do Firebase não encontrada.";
        statusTag.style.color = "#9b3f4d";
        return;
      }

      try {
        firebase.initializeApp(window.firebaseConfig);
      } catch (erro) {
        if (!String(erro && erro.message || "").includes("already exists")) {
          statusTag.textContent = "Falha ao iniciar Firebase para leitura da tag.";
          statusTag.style.color = "#9b3f4d";
          return;
        }
      }

      const auth = firebase.auth();
      const db = firebase.database();
      const baseUrl = String(window.firebaseConfig.databaseURL || "").replace(/\/+$/, "");

      function obterUltimaRfid(dadosBrutos) {
        const dados = dadosBrutos || {};
        let ultimaRFID = null;

        Object.values(dados).forEach((item) => {
          if (!item) return;
          const uid = String(item.uid || item.uid_tag || "");
          const ehUltrassonico = uid.toUpperCase() === "SENSOR_ULTRASSONICO"
            || String(item.tipo_tag || "").toLowerCase() === "ultrassonico";
          if (ehUltrassonico) return;

          if (!ultimaRFID || Number(item.timestamp || 0) > Number(ultimaRFID.timestamp || 0)) {
            ultimaRFID = item;
          }
        });

        return ultimaRFID;
      }

      function aplicarTagDetectada(leituras) {
        const ultimaRFID = obterUltimaRfid(leituras);
        if (!ultimaRFID) return false;
        const uidDetectada = formatarTag(ultimaRFID.uid || ultimaRFID.uid_tag || "");
        if (!uidDetectada) return false;
        tagAdminInput.value = uidDetectada;
        statusTag.textContent = `Tag detectada: ${uidDetectada}`;
        statusTag.style.color = "#2f6b4f";
        return true;
      }

      function iniciarListenerRealtime() {
        db.ref("leituras_recentes")
          .limitToLast(40)
          .on("value", (snapshot) => {
            aplicarTagDetectada(snapshot.val() || {});
          }, () => {
            statusTag.textContent = "Realtime indisponível. Tentando leitura por atualização periódica...";
            statusTag.style.color = "#9b3f4d";
          });
      }

      async function atualizarPorPolling() {
        if (!baseUrl) return;
        try {
          const [respLeituras, respAcessos] = await Promise.all([
            fetch(`${baseUrl}/leituras_recentes.json?ts=${Date.now()}`),
            fetch(`${baseUrl}/acessos.json?ts=${Date.now()}`)
          ]);
          if (!respLeituras.ok && !respAcessos.ok) return;

          const dadosLeituras = respLeituras.ok ? await respLeituras.json() : {};
          const dadosAcessos = respAcessos.ok ? await respAcessos.json() : {};
          const aplicadoLeituras = aplicarTagDetectada(dadosLeituras || {});
          if (!aplicadoLeituras) {
            aplicarTagDetectada(dadosAcessos || {});
          }
        } catch (erro) {
        }
      }

      auth.signInAnonymously()
        .then(() => {
          iniciarListenerRealtime();
          atualizarPorPolling();
        })
        .catch(() => {
          statusTag.textContent = "Falha na autenticação anônima. Usando leitura periódica da tag.";
          statusTag.style.color = "#9b3f4d";
          iniciarListenerRealtime();
        });

      setInterval(atualizarPorPolling, 2000);
    }

    tipoUsuario.addEventListener("change", function () {
      campoTagAdmin.style.display = this.value === "admin" ? "block" : "none";
    });

    iniciarLeituraTagRfid();

    formConta.addEventListener("submit", function (event) {
      event.preventDefault();
      const resultado = AuthApp.criarConta({
        email: document.getElementById("email").value,
        senha: document.getElementById("senha").value,
        confirmarSenha: document.getElementById("confirmar").value,
        role: tipoUsuario.value,
        tag: document.getElementById("tag-admin").value
      });

      cadastroMsg.textContent = resultado.mensagem;
      cadastroMsg.style.color = resultado.ok ? "#2f6b4f" : "#9b3f4d";

      if (resultado.ok) {
        formConta.reset();
        campoTagAdmin.style.display = "none";
      }
    });
  </script>
</body>
</html>
