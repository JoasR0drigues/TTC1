<!DOCTYPE html>
<html lang="pt-BR"></html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topo">
    <div class="logo-texto">
    <span class="logo-destaque">Proteção</span> Patrimonial RFID
    </div>

    <nav class="menu">
      <a href="Login.HTML" class="ativo">Início</a>
      <a href="sobre.html">Sobre</a>
    </nav>
  </header>

  <main class="conteudo-login">
    <section class="card">
      <h2>Cadastro de Usuário</h2>

      <form>
        <div class="campo">
        <label for="email">Usuário</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
        </div>

        <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
        </div>

        <div class="campo">
        <label for="Confrimar">Confirmar Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha Novamente">
        </div>
        
        <div class="campo">
        <label for="Tag">Tag UID Admim</label>
        <input type="password" id="Tag" name="senha" placeholder="33 9D F7 0D">
        </div>

        <div class="botoes">
        <button type="voltar" class="btn btn-primario">Voltar</button>
        <a href="sobre.html" class="btn btn-secundario">Criar conta</a>
        </div>
      </form>
      
      <section class="card hero-imagem">
      <div class="card-logo">
      <img src="logo-rfid.png" alt="Logo do sistema">
      </div>
     </section>
    </main>



</body>


</html>
