<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proteção Patrimonial RFID - Início</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="logo-texto">
    <span class="logo-destaque">Proteção</span> Patrimonial RFID
    </div>

    <nav class="menu">
      <a href="Login.HTML" class="ativo">Início</a>
      <a href="sobre.html">Sobre</a>
    </nav>
  </header>

  <main class="conteudo-login">
    <section class="card">
      <h2>Entrar</h2>

      <form id="form-login">
        <div class="campo">
        <label for="email">Usuário</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="campo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
        </div>

        <div class="campo">
        <label for="tag-admin">Tag UID (obrigatória para admin)</label>
        <input type="text" id="tag-admin" name="tag-admin" placeholder="Ex: 33 9D F7 0D">
        </div>

        <div class="botoes">
        <button type="submit" class="btn btn-primario">Entrar</button>
        <a href="criarconta.html" class="btn btn-secundario">Criar conta</a>
        </div>
       
      </form>
    </section>

    <section class="card hero-imagem">
      <div class="card-logo">
      <img src="logo-rfid.png" alt="Logo do sistema">
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    const sessaoAtual = AuthApp.protegerPagina({ allowAnonymous: true });
    if (sessaoAtual) {
      window.location.href = sessaoAtual.role === "admin" ? "Patrimônios.html" : "historico.html";
    }

    const formLogin = document.getElementById("form-login");
    const loginMsg = document.getElementById("login-msg");

    formLogin.addEventListener("submit", function (event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const tag = document.getElementById("tag-admin").value;

      const resultado = AuthApp.login(email, senha, tag);
      if (!resultado.ok) {
        loginMsg.textContent = resultado.mensagem;
        loginMsg.style.color = "#9b3f4d";
        return;
      }

      loginMsg.textContent = "Login realizado com sucesso.";
      loginMsg.style.color = "#2f6b4f";
      window.location.href = resultado.user.role === "admin" ? "Patrimônios.html" : "historico.html";
    });
  </script>
</body>
</html>
