<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proteção Patrimonial RFID - Início</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="logo-texto">
      <span class="logo-destaque">Proteção</span> Patrimonial RFID
    </div>

    <nav class="menu">
      <a href="Login.HTML" class="ativo">Início</a>
      <a href="sobre.html">Sobre</a>
      <a href="sobre.html#design">Design</a>
    </nav>
  </header>

  <main class="conteudo-login">
    <section class="card">
      <h2>Entrar</h2>

      <form>
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
        </div>

        <div class="botoes">
          <button type="submit" class="btn btn-primario">Entrar</button>
          <a href="sobre.html" class="btn btn-secundario">Criar conta</a>
        </div>
      </form>
    </section>

    <section class="card hero-imagem">
      <div class="card-logo">
        <img src="logo-rfid.png" alt="Logo do sistema">
      </div>
    </section>
  </main>

</body>
</html>
